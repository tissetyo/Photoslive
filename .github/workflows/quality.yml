name: Photoslive quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@f586c14365d4643c6aa59d472ae6e984bf47bb34
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: photobox/web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm ci
        working-directory: photobox/web
      - run: npm audit --omit=dev --audit-level=high
        working-directory: photobox/web
      - run: python -m pip install pip-audit==2.9.0
      - run: python -m pip_audit -r photobox/requirements-controller.txt

  cloud-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: photobox/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: photobox/web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run audit

  local-controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check --no-input -r photobox/requirements-controller.txt
      - run: python -m unittest photobox/tests/test_local_first.py

  hardware-simulator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check --no-input -r photobox/requirements-controller.txt
      - run: python -m unittest photobox/tests/test_hardware_simulator.py

  booth-browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: photobox/web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check --no-input -r photobox/requirements-controller.txt
      - run: npm ci
        working-directory: photobox/web
      - run: npx playwright install --with-deps chromium
        working-directory: photobox/web
      - run: npm run test:e2e
        working-directory: photobox/web

  postgres-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1
      - run: supabase start -x studio,imgproxy,edge-runtime,logflare,vector,supavisor
      - run: supabase db reset --local
      - run: supabase db lint --local --level warning
