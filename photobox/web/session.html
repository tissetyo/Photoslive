<!doctype html><html lang="id"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Hasil Foto Photoslive</title><link rel="stylesheet" href="/platform.css"><style>.gallery-shell{min-height:100vh;padding:36px clamp(18px,6vw,90px);background:#f3f4f7}.gallery-head{max-width:1180px;margin:0 auto 28px}.gallery-head h1{margin:0;font-size:clamp(40px,6vw,76px);letter-spacing:-.065em}.gallery-head>p:not(.eyebrow){max-width:680px;color:#666b76;line-height:1.6}.gallery-grid{max-width:1180px;display:grid;grid-template-columns:1.1fr .9fr;gap:20px;margin:auto}.gallery-card{padding:24px;border:1px solid #e0e2e8;border-radius:8px;background:#fff}.gallery-card h2{margin:0 0 18px}.raw-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.photo-item{overflow:hidden;border:1px solid #e1e3e8;border-radius:8px;background:#fafafa}.photo-item img{width:100%;aspect-ratio:1;display:block;object-fit:cover}.photo-actions{display:flex;align-items:center;justify-content:space-between;padding:12px}.photo-actions b{font-size:12px}.photo-actions a{color:#6257e8;font-size:12px;font-weight:850}.composite{width:min(320px,90%);margin:0 auto;padding:18px 18px 48px;background:#eee;box-shadow:0 18px 50px rgba(0,0,0,.14)}.composite img{width:100%;aspect-ratio:1;display:block;margin-bottom:8px;object-fit:cover}.flipbook{position:relative;width:min(320px,90%);aspect-ratio:1;margin:20px auto;overflow:hidden;border-radius:8px;background:#17191f}.flipbook img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;animation:flip 4s infinite}.flipbook img:nth-child(2){animation-delay:1s}.flipbook img:nth-child(3){animation-delay:2s}.flipbook img:nth-child(4){animation-delay:3s}@keyframes flip{0%,20%{opacity:1}25%,100%{opacity:0}}.gallery-actions{display:flex;justify-content:center;margin-top:18px}.expires{max-width:1180px;margin:22px auto 0;padding:16px 20px;border-radius:8px;background:#fff7df;color:#795b11;font-size:12px}.loading{padding:80px;text-align:center;color:#6b707b}@media(max-width:800px){.gallery-grid{grid-template-columns:1fr}.raw-grid{grid-template-columns:1fr 1fr}}@media(max-width:480px){.raw-grid{grid-template-columns:1fr}}</style></head><body><main class="gallery-shell"><header class="gallery-head"><p class="eyebrow">PHOTOSLIVE · HASIL SESI</p><h1>Kenanganmu siap diunduh.</h1><p>Unduh setiap foto pilihan, hasil kolase dengan frame, dan lihat animasi flipbook sederhana. Halaman tersedia selama 24 jam.</p></header><div id="session-loading" class="loading">Menghubungkan ke photobox…</div><div id="session-content" class="hidden"><div class="gallery-grid"><section class="gallery-card"><h2>Foto satuan</h2><div class="raw-grid" id="raw-photos"></div></section><section><article class="gallery-card"><h2>Hasil dengan frame</h2><div class="composite" id="composite-preview"></div><div class="gallery-actions"><button class="btn primary" id="download-composite">Download kolase PNG</button></div></article><article class="gallery-card"><h2>Flipbook</h2><div class="flipbook" id="flipbook"></div></article></section></div><p class="expires" id="expiry-note"></p></div><p class="status" id="session-error"></p></main><script src="/session.js?v=2" defer></script></body></html>
