<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Setup Photoslive</title>
  <link rel="stylesheet" href="/platform.css?v=2">
  <link rel="stylesheet" href="/setup.css?v=1">
</head>
<body>
  <div class="platform-shell">
    <nav class="platform-nav">
      <a class="platform-brand" href="/"><span class="platform-mark"><img src="/icons/camera.svg" alt=""></span>Photoslive</a>
      <a class="btn" href="/">Kembali</a>
    </nav>
    <main class="auth-layout">
      <section class="auth-card">
        <header class="auth-head">
          <p class="eyebrow">SETUP CEPAT</p>
          <h1 id="setup-title">Hubungkan photobox</h1>
          <p id="setup-copy">Instal Agent, masukkan kode setup, lalu buat akun pemilik.</p>
        </header>

        <div class="mode-tabs" id="setup-modes">
          <button type="button" class="active" data-mode="setup">Mesin baru</button>
          <button type="button" data-mode="login">Sudah punya akun</button>
        </div>

        <form id="setup-form">
          <div class="form-grid">
            <label class="full">Kode setup<input id="pairing-code" maxlength="9" placeholder="ABCD-1234" required></label>
            <label>Nama photobox<input id="booth-name" placeholder="Photoslive Booth 01" required></label>
            <label>Lokasi<input id="booth-location" placeholder="Main Hall"></label>
            <label class="full">Email pemilik<input id="owner-email" type="email" autocomplete="email" required></label>
            <label>Password<input id="owner-password" type="password" minlength="8" autocomplete="new-password" required></label>
            <label>Nama pengguna<input id="owner-name" placeholder="Pemilik"></label>
            <label>PIN admin (6 angka)<input id="owner-pin" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required></label>
            <label>Konfirmasi PIN<input id="owner-pin-confirm" inputmode="numeric" pattern="[0-9]{6}" maxlength="6" required></label>
          </div>
          <div class="form-actions"><button class="btn primary">Selesaikan setup</button></div>
        </form>

        <form id="login-form" class="hidden">
          <div class="form-grid">
            <label class="full">Kode/nama photobox<input id="login-booth" placeholder="abcd-1234" required></label>
            <label>Email<input id="login-email" type="email" autocomplete="email"></label>
            <label>Password<input id="login-password" type="password" autocomplete="current-password"></label>
            <label class="full">Atau masuk cepat dengan PIN<input id="login-pin" inputmode="numeric" maxlength="6" placeholder="6 angka"></label>
          </div>
          <div class="login-actions">
            <button type="button" class="text-button" id="open-forgot">Lupa password?</button>
            <button class="btn primary">Masuk admin</button>
          </div>
        </form>

        <form id="forgot-form" class="hidden forgot-page">
          <button type="button" class="back-link" id="forgot-back"><img src="/icons/chevron-left.svg" alt="">Kembali ke halaman masuk</button>
          <div class="form-grid">
            <label class="full">Email terdaftar<input id="forgot-email" type="email" autocomplete="email" required></label>
            <label class="full">Pesan untuk superadmin<input id="forgot-message" placeholder="Jelaskan mesin atau lokasi Anda"></label>
          </div>
          <div class="form-actions"><button class="btn primary">Kirim permintaan</button></div>
        </form>

        <p class="status" id="setup-status"></p>

        <aside class="agent-recovery" id="agent-recovery">
          <div class="recovery-heading">
            <span class="recovery-icon"><img src="/icons/terminal.svg" alt=""></span>
            <div><b>Mesin sudah pernah dipasangkan?</b><p>Buat kode setup baru dari mini PC. Kode berlaku selama 15 menit.</p></div>
          </div>
          <div class="command-box">
            <code id="setup-code-command">python3 "$HOME/.local/share/photoslive/source/photobox/agent.py" --setup-code</code>
            <button type="button" id="copy-setup-command" aria-label="Salin perintah"><img src="/icons/copy.svg" alt=""><span>Salin</span></button>
          </div>
          <p class="copy-feedback" id="copy-feedback" role="status"></p>
        </aside>
      </section>
    </main>
  </div>
  <script src="/setup.js?v=3" defer></script>
</body>
</html>
